server {
    listen 80;
    server_name food.wayon.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name food.wayon.in;

    ssl_certificate /etc/letsencrypt/live/app.wayon.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.wayon.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:6767;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.food.wayon.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.food.wayon.in;

    ssl_certificate /etc/letsencrypt/live/app.wayon.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.wayon.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WhatsApp Flow Data Exchange (Direct to Bot)
    location /api/whatsapp/flow {
        proxy_pass http://localhost:6767;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # All other API/Webhook traffic (To Partner Proxy)
    location / {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
